<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #7d8590; --blue: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff; --cyan: #39d353;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, monospace;
    background: var(--bg); color: var(--text);
    padding: 20px; line-height: 1.5;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 20px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .status { display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); animation: pulse 2s infinite;
  }
  .status-dot.disconnected { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .elapsed { color: var(--dim); font-size: 14px; font-family: monospace; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .card-header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--dim);
  }
  .card-body { padding: 12px 16px; }

  /* Config card */
  .config-grid {
    display: grid; grid-template-columns: auto 1fr;
    gap: 4px 16px; font-size: 13px;
  }
  .config-label { color: var(--dim); }
  .config-value { font-family: monospace; color: var(--cyan); }

  /* Pipeline phases */
  .phase {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .phase:last-child { border-bottom: none; }
  .phase-icon { width: 20px; text-align: center; font-size: 14px; }
  .phase-name { flex: 1; font-size: 14px; font-weight: 500; }
  .phase-detail { color: var(--dim); font-size: 12px; font-family: monospace; }
  .phase-time { color: var(--dim); font-size: 12px; font-family: monospace; min-width: 50px; text-align: right; }

  /* Agent cards */
  .agents-grid { display: flex; flex-direction: column; gap: 6px; }
  .agent-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--bg); border-radius: 6px;
  }
  .agent-name { flex: 1; font-weight: 500; font-size: 14px; }
  .agent-model { color: var(--dim); font-size: 11px; font-family: monospace; }
  .agent-status {
    font-size: 12px; padding: 2px 8px; border-radius: 10px;
    font-weight: 500;
  }
  .agent-status.pending { color: var(--dim); background: #21262d; }
  .agent-status.running { color: var(--blue); background: #1a2332; }
  .agent-status.done { color: var(--green); background: #12261e; }
  .agent-status.failed { color: var(--red); background: #2d1215; }
  .agent-timer { color: var(--dim); font-size: 12px; font-family: monospace; min-width: 40px; text-align: right; }

  /* LLM calls */
  .llm-card { grid-column: 1 / -1; }
  .llm-calls { display: flex; flex-direction: column; gap: 6px; max-height: 250px; overflow-y: auto; }
  .llm-row {
    display: grid; grid-template-columns: 100px 1fr 100px 80px 80px 60px;
    gap: 8px; align-items: center;
    padding: 8px 12px; background: var(--bg); border-radius: 6px;
    font-size: 12px; font-family: monospace;
  }
  .llm-row .label { color: var(--dim); }
  .llm-row .model { color: var(--purple); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .llm-row .size { color: var(--cyan); }
  .llm-row .tokens { color: var(--yellow); }
  .llm-row .time { color: var(--green); }
  .llm-row .status-badge { text-align: center; }
  .llm-row .status-badge.pending { color: var(--blue); }
  .llm-row .status-badge.done { color: var(--green); }
  .llm-row .status-badge.failed { color: var(--red); }

  /* Files card */
  .files-card { max-height: 300px; }
  .files-list { max-height: 240px; overflow-y: auto; }
  .file-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 12px; font-family: monospace;
    border-bottom: 1px solid var(--border);
  }
  .file-row:last-child { border-bottom: none; }
  .file-icon { color: var(--blue); }
  .file-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { color: var(--dim); min-width: 70px; text-align: right; }

  /* Log panel */
  .log-card { grid-column: 1 / -1; }
  .log-entries {
    max-height: 300px; overflow-y: auto;
    font-size: 12px; font-family: monospace;
  }
  .log-entry {
    padding: 4px 8px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: var(--dim); min-width: 80px; }
  .log-kind {
    min-width: 120px; font-weight: 500;
  }
  .log-kind.phase { color: var(--blue); }
  .log-kind.agent { color: var(--purple); }
  .log-kind.llm { color: var(--cyan); }
  .log-kind.tool { color: var(--yellow); }
  .log-kind.file { color: var(--green); }
  .log-kind.warning { color: var(--red); }
  .log-msg { color: var(--text); flex: 1; word-break: break-all; }

  /* Agent context */
  .agent-ctx-section {
    margin-bottom: 12px; padding: 10px 14px;
    background: var(--bg); border-radius: 6px; border-left: 3px solid var(--blue);
  }
  .agent-ctx-section.done { border-left-color: var(--green); opacity: 0.6; }
  .agent-ctx-section.running { border-left-color: var(--blue); }
  .agent-ctx-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
  }
  .agent-ctx-header .name { font-weight: 600; font-size: 14px; }
  .agent-ctx-header .badge {
    font-size: 11px; padding: 1px 8px; border-radius: 10px;
    background: #1a2332; color: var(--blue);
  }
  .agent-ctx-header .badge.done { background: #12261e; color: var(--green); }
  .agent-ctx-files {
    display: flex; flex-wrap: wrap; gap: 4px 10px; font-size: 12px;
    font-family: monospace;
  }
  .agent-ctx-file {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 6px; background: var(--surface); border-radius: 3px;
  }
  .agent-ctx-file .path { color: var(--cyan); }
  .agent-ctx-file .size { color: var(--dim); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }

  /* Diff comparison */
  .diff-card { grid-column: 1 / -1; }
  .diff-files { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .diff-file-row {
    display: grid; grid-template-columns: 1fr 120px 120px;
    gap: 8px; align-items: center;
    padding: 8px 12px; background: var(--bg); border-radius: 6px;
    font-size: 12px; font-family: monospace;
  }
  .diff-file-row .filepath { color: var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .diff-old { color: var(--red); }
  .diff-new { color: var(--green); }
  .diff-bar { display: flex; gap: 2px; height: 8px; margin-top: 4px; }
  .diff-bar .old-bar { background: var(--red); border-radius: 2px; opacity: 0.7; }
  .diff-bar .new-bar { background: var(--green); border-radius: 2px; opacity: 0.7; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Code Review Monitor</h1>
  <div class="status">
    <div class="status-dot" id="connDot"></div>
    <span id="connText" style="font-size:13px;color:var(--dim)">Connecting...</span>
    <span class="elapsed" id="elapsed">0s</span>
  </div>
</div>

<div class="grid">
  <!-- Config -->
  <div class="card">
    <div class="card-header">Configuration</div>
    <div class="card-body">
      <div class="config-grid" id="configGrid">
        <span class="config-label">Loading...</span>
        <span class="config-value"></span>
      </div>
    </div>
  </div>

  <!-- Pipeline Phases -->
  <div class="card">
    <div class="card-header">Pipeline</div>
    <div class="card-body" id="phases"></div>
  </div>

  <!-- Agents -->
  <div class="card">
    <div class="card-header">AI Agents</div>
    <div class="card-body">
      <div class="agents-grid" id="agents">
        <div style="color:var(--dim);font-size:13px">Waiting for agents...</div>
      </div>
    </div>
  </div>

  <!-- Agent Context — what each agent is processing -->
  <div class="card" style="grid-column: 1 / -1;">
    <div class="card-header">Agent Context — Files Being Analyzed</div>
    <div class="card-body" id="agentContext">
      <div style="color:var(--dim);font-size:13px">Waiting for agents to start...</div>
    </div>
  </div>

  <!-- Old vs New Code -->
  <div class="card diff-card">
    <div class="card-header">Old vs New Code <span id="diffCount" style="color:var(--cyan)"></span></div>
    <div class="card-body">
      <div class="diff-files" id="diffFiles">
        <div style="color:var(--dim);font-size:13px">Waiting for diff analysis...</div>
      </div>
    </div>
  </div>

  <!-- Files -->
  <div class="card files-card">
    <div class="card-header">Files Loaded <span id="fileCount" style="color:var(--cyan)"></span></div>
    <div class="card-body">
      <div class="files-list" id="files"></div>
    </div>
  </div>

  <!-- LLM Calls -->
  <div class="card llm-card">
    <div class="card-header">LLM Calls</div>
    <div class="card-body">
      <div class="llm-calls" id="llmCalls">
        <div style="color:var(--dim);font-size:13px">No LLM calls yet...</div>
      </div>
    </div>
  </div>

  <!-- Event Log -->
  <div class="card log-card">
    <div class="card-header">Event Log <span id="eventCount" style="color:var(--dim)">(0)</span></div>
    <div class="card-body">
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────

const state = {
  connected: false,
  startTime: null,
  phases: {},        // name → {status, detail, startTime, endTime}
  agents: {},        // name → {status, model, startTime, endTime}
  files: [],         // [{path, chars}]
  llmCalls: [],      // [{agent, model, promptChars, responseChars, status, startTime, endTime}]
  agentFiles: {},    // agent → {files: [{path, chars}], status}
  agentFileProgress: {},  // agent → {files: [{path, status, findings, error}], currentFile, total}
  diffFiles: [],     // [{path, oldLines, newLines, oldChars, newChars}]
  events: [],        // all events for log
};

// ── SSE Connection ─────────────────────────────────────────────────────────

function connect() {
  const es = new EventSource('/events');

  es.onopen = () => {
    state.connected = true;
    if (!state.startTime) state.startTime = Date.now();
    render();
  };

  es.onerror = () => {
    state.connected = false;
    render();
  };

  // Listen to all event types
  const eventTypes = [
    'phase.start', 'phase.done', 'phase.fail',
    'agent.start', 'agent.done', 'agent.fail', 'agent.set', 'agent.files',
    'agent.file.start', 'agent.file.done', 'agent.file.skip',
    'llm.request', 'llm.response', 'llm.error',
    'diff.file',
    'file.loaded', 'tool.start', 'tool.done', 'tool.skip',
    'log.warning', 'log.error',
    'review.start', 'review.done',
  ];

  eventTypes.forEach(type => {
    es.addEventListener(type, (e) => {
      const event = JSON.parse(e.data);
      handleEvent(event);
    });
  });

  // Fallback: unnamed messages
  es.onmessage = (e) => {
    if (e.data.startsWith('{')) {
      const event = JSON.parse(e.data);
      handleEvent(event);
    }
  };
}

function handleEvent(event) {
  const {kind, data, ts} = event;
  state.events.push(event);

  if (!state.startTime) state.startTime = ts * 1000;

  switch (kind) {
    case 'review.start':
      state.startTime = ts * 1000;
      break;

    case 'phase.start':
      state.phases[data.phase] = {
        status: 'running', detail: data.detail || '',
        startTime: ts, endTime: null
      };
      break;
    case 'phase.done':
      if (state.phases[data.phase]) {
        state.phases[data.phase].status = 'done';
        state.phases[data.phase].detail = data.detail || state.phases[data.phase].detail;
        state.phases[data.phase].endTime = ts;
      }
      break;
    case 'phase.fail':
      if (state.phases[data.phase]) {
        state.phases[data.phase].status = 'failed';
        state.phases[data.phase].detail = data.detail || '';
        state.phases[data.phase].endTime = ts;
      }
      break;

    case 'agent.set':
      (data.agents || []).forEach(a => {
        if (!state.agents[a]) state.agents[a] = {status: 'pending', model: '', startTime: null, endTime: null};
      });
      break;
    case 'agent.start':
      state.agents[data.agent] = {
        ...(state.agents[data.agent] || {}),
        status: 'running', model: data.model || '', startTime: ts, endTime: null
      };
      break;
    case 'agent.files':
      state.agentFiles[data.agent] = {
        files: (data.files || []).map(f => ({
          path: f,
          chars: (data.chars && data.chars[f]) || 0
        })),
        status: 'running'
      };
      break;
    case 'agent.done':
      if (state.agents[data.agent]) {
        state.agents[data.agent].status = 'done';
        state.agents[data.agent].endTime = ts;
        if (data.findings !== undefined) state.agents[data.agent].findings = data.findings;
      }
      if (state.agentFiles[data.agent]) state.agentFiles[data.agent].status = 'done';
      break;
    case 'agent.fail':
      if (state.agents[data.agent]) {
        state.agents[data.agent].status = 'failed';
        state.agents[data.agent].endTime = ts;
        state.agents[data.agent].error = data.error || '';
      }
      break;

    case 'agent.file.start': {
      const a = data.agent;
      if (!state.agentFileProgress[a]) state.agentFileProgress[a] = {files: [], currentFile: null, total: 0};
      state.agentFileProgress[a].currentFile = data.file;
      state.agentFileProgress[a].total = data.total || 0;
      state.agentFileProgress[a].files.push({
        path: data.file, status: 'running', findings: 0,
        chars: data.chars || 0, startTime: ts, endTime: null
      });
      break;
    }
    case 'agent.file.done': {
      const a = data.agent;
      if (state.agentFileProgress[a]) {
        const f = state.agentFileProgress[a].files.find(f => f.path === data.file);
        if (f) {
          f.status = data.error ? 'failed' : (data.cached ? 'cached' : 'done');
          f.findings = data.findings || 0;
          f.error = data.error || '';
          f.endTime = ts;
        }
        state.agentFileProgress[a].currentFile = null;
      }
      break;
    }
    case 'agent.file.skip': {
      const a = data.agent;
      if (!state.agentFileProgress[a]) state.agentFileProgress[a] = {files: [], currentFile: null, total: 0};
      state.agentFileProgress[a].files.push({
        path: data.file, status: 'skipped', findings: 0, reason: data.reason
      });
      break;
    }

    case 'llm.request':
      state.llmCalls.push({
        id: data.id || state.llmCalls.length,
        agent: data.agent, model: data.model,
        promptChars: data.prompt_chars || 0,
        responseChars: 0, status: 'pending',
        startTime: ts, endTime: null
      });
      break;
    case 'llm.response':
      const call = state.llmCalls.find(c => c.id === data.id) || state.llmCalls[state.llmCalls.length - 1];
      if (call) {
        call.status = 'done';
        call.responseChars = data.response_chars || 0;
        call.endTime = ts;
      }
      break;
    case 'llm.error':
      const errCall = state.llmCalls.find(c => c.id === data.id) || state.llmCalls[state.llmCalls.length - 1];
      if (errCall) {
        errCall.status = 'failed';
        errCall.error = data.error || '';
        errCall.endTime = ts;
      }
      break;

    case 'diff.file':
      state.diffFiles.push({
        path: data.path || '',
        oldLines: data.old_lines || 0, newLines: data.new_lines || 0,
        oldChars: data.old_chars || 0, newChars: data.new_chars || 0,
      });
      break;

    case 'file.loaded':
      state.files.push({path: data.path || '', chars: data.chars || 0});
      break;

    case 'tool.start':
    case 'tool.done':
    case 'tool.skip':
      break; // rendered in event log

    case 'log.warning':
    case 'log.error':
      break; // rendered in event log
  }

  render();
}

// ── Rendering ──────────────────────────────────────────────────────────────

function render() {
  // Connection status
  const dot = document.getElementById('connDot');
  const text = document.getElementById('connText');
  dot.className = state.connected ? 'status-dot' : 'status-dot disconnected';
  text.textContent = state.connected ? 'Connected' : 'Disconnected';

  renderPhases();
  renderAgents();
  renderAgentContext();
  renderDiffFiles();
  renderFiles();
  renderLLMCalls();
  renderLog();
}

function fmtDuration(startTs, endTs) {
  const s = (endTs || Date.now()/1000) - startTs;
  if (s < 60) return s.toFixed(1) + 's';
  return Math.floor(s/60) + 'm ' + Math.floor(s%60) + 's';
}

function fmtChars(n) {
  if (n > 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n > 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function renderPhases() {
  const el = document.getElementById('phases');
  const phaseOrder = ['static_analysis', 'context', 'agents'];
  const phaseLabels = {
    static_analysis: 'Static Analysis',
    context: 'Context Assembly',
    agents: 'AI Agents'
  };

  el.innerHTML = phaseOrder.map(name => {
    const p = state.phases[name] || {status: 'pending', detail: ''};
    let icon, timeStr = '';

    if (p.status === 'running') {
      icon = '<span class="spinner" style="color:var(--blue)">&#9696;</span>';
      if (p.startTime) timeStr = fmtDuration(p.startTime, null);
    } else if (p.status === 'done') {
      icon = '<span style="color:var(--green)">&#10003;</span>';
      if (p.startTime && p.endTime) timeStr = fmtDuration(p.startTime, p.endTime);
    } else if (p.status === 'failed') {
      icon = '<span style="color:var(--red)">&#10007;</span>';
    } else {
      icon = '<span style="color:var(--dim)">&#9675;</span>';
    }

    return `<div class="phase">
      <div class="phase-icon">${icon}</div>
      <div class="phase-name">${phaseLabels[name] || name}</div>
      <div class="phase-detail">${p.detail}</div>
      <div class="phase-time">${timeStr}</div>
    </div>`;
  }).join('');
}

function renderAgents() {
  const el = document.getElementById('agents');
  const agentNames = Object.keys(state.agents);
  if (agentNames.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:13px">Waiting for agents...</div>';
    return;
  }

  const order = ['syntax', 'logic', 'security', 'git_history'];
  const sorted = order.filter(a => agentNames.includes(a)).concat(agentNames.filter(a => !order.includes(a)));

  el.innerHTML = sorted.map(name => {
    const a = state.agents[name];
    let timeStr = '';
    if (a.startTime) timeStr = fmtDuration(a.startTime, a.endTime);

    return `<div class="agent-row">
      <div class="agent-name">${name}</div>
      <div class="agent-model">${a.model || ''}</div>
      <div class="agent-status ${a.status}">${a.status}</div>
      <div class="agent-timer">${timeStr}</div>
    </div>`;
  }).join('');
}

function renderAgentContext() {
  const el = document.getElementById('agentContext');
  const progressAgents = Object.keys(state.agentFileProgress);
  const fileAgents = Object.keys(state.agentFiles);
  const allAgents = [...new Set([...progressAgents, ...fileAgents])];

  if (allAgents.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:13px">Waiting for agents to start...</div>';
    return;
  }

  const order = ['syntax', 'logic', 'security', 'git_history'];
  const sorted = order.filter(a => allAgents.includes(a)).concat(allAgents.filter(a => !order.includes(a)));

  el.innerHTML = sorted.map(agent => {
    const progress = state.agentFileProgress[agent];
    const agentState = state.agents[agent] || {};
    const isAgentDone = agentState.status === 'done';

    let timeStr = '';
    if (agentState.startTime) timeStr = fmtDuration(agentState.startTime, agentState.endTime);

    if (!progress || progress.files.length === 0) {
      // No per-file data yet — show file list from agent.files event
      const ctx = state.agentFiles[agent];
      if (!ctx) return '';
      const statusClass = isAgentDone ? 'done' : 'running';
      const filesHtml = ctx.files.map(f => {
        const shortPath = f.path.split(/[/\\]/).slice(-2).join('/');
        return `<div class="agent-ctx-file"><span class="path">${shortPath}</span></div>`;
      }).join('');
      return `<div class="agent-ctx-section ${statusClass}">
        <div class="agent-ctx-header">
          <span class="name">${agent}</span>
          <span class="badge ${statusClass}">${isAgentDone ? 'done' : 'starting...'}</span>
          <span style="color:var(--dim);font-size:12px;font-family:monospace;margin-left:auto">${timeStr}</span>
        </div>
        <div class="agent-ctx-files">${filesHtml}</div>
      </div>`;
    }

    // Per-file progress view
    const done = progress.files.filter(f => f.status === 'done' || f.status === 'cached').length;
    const total = progress.total || progress.files.length;
    const totalFindings = progress.files.reduce((s, f) => s + (f.findings || 0), 0);
    const statusClass = isAgentDone ? 'done' : 'running';
    const progressPct = total > 0 ? Math.round((done / total) * 100) : 0;

    const filesHtml = progress.files.map(f => {
      const shortPath = f.path.split(/[/\\]/).slice(-2).join('/');
      let icon, style, extra = '';
      if (f.status === 'running') {
        icon = '<span class="spinner" style="font-size:10px">&#9696;</span>';
        style = 'border-left: 2px solid var(--blue)';
        if (f.startTime) extra = `<span class="size">${fmtDuration(f.startTime, null)}</span>`;
      } else if (f.status === 'done' || f.status === 'cached') {
        icon = '<span style="color:var(--green)">&#10003;</span>';
        style = 'border-left: 2px solid var(--green); opacity: 0.7';
        if (f.findings > 0) extra = `<span style="color:var(--yellow)">${f.findings} issue${f.findings > 1 ? 's' : ''}</span>`;
        else extra = '<span style="color:var(--green)">clean</span>';
        if (f.status === 'cached') extra += ' <span style="color:var(--dim)">(cached)</span>';
      } else if (f.status === 'failed') {
        icon = '<span style="color:var(--red)">&#10007;</span>';
        style = 'border-left: 2px solid var(--red)';
        extra = `<span style="color:var(--red)">${f.error || 'failed'}</span>`;
      } else if (f.status === 'skipped') {
        icon = '<span style="color:var(--dim)">&#8211;</span>';
        style = 'opacity: 0.5';
        extra = '<span style="color:var(--dim)">skipped</span>';
      } else {
        icon = '<span style="color:var(--dim)">&#9675;</span>';
        style = 'opacity: 0.5';
      }

      return `<div class="agent-ctx-file" style="${style}; padding: 4px 8px;">
        ${icon} <span class="path">${shortPath}</span> ${extra}
      </div>`;
    }).join('');

    // Progress bar
    const barHtml = `<div style="width:100%;height:4px;background:var(--border);border-radius:2px;margin:6px 0">
      <div style="width:${progressPct}%;height:100%;background:var(--green);border-radius:2px;transition:width 0.3s"></div>
    </div>`;

    return `<div class="agent-ctx-section ${statusClass}">
      <div class="agent-ctx-header">
        <span class="name">${agent}</span>
        <span class="badge ${statusClass}">${isAgentDone ? 'done' : `${done}/${total} files`}</span>
        <span style="color:var(--yellow);font-size:12px">${totalFindings > 0 ? totalFindings + ' issues' : ''}</span>
        <span style="color:var(--dim);font-size:12px;font-family:monospace;margin-left:auto">${timeStr}</span>
      </div>
      ${barHtml}
      <div class="agent-ctx-files" style="flex-direction:column">${filesHtml}</div>
    </div>`;
  }).join('');
}

function renderDiffFiles() {
  const el = document.getElementById('diffFiles');
  const countEl = document.getElementById('diffCount');
  countEl.textContent = state.diffFiles.length ? `(${state.diffFiles.length} files)` : '';

  if (state.diffFiles.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:13px">Waiting for diff analysis...</div>';
    return;
  }

  el.innerHTML = state.diffFiles.map(f => {
    const shortPath = f.path.split(/[/\\]/).slice(-3).join('/');
    const maxChars = Math.max(f.oldChars, f.newChars, 1);
    const oldPct = Math.round((f.oldChars / maxChars) * 100);
    const newPct = Math.round((f.newChars / maxChars) * 100);

    return `<div class="diff-file-row">
      <div>
        <div class="filepath" title="${f.path}">${shortPath}</div>
        <div class="diff-bar">
          <div class="old-bar" style="width:${oldPct}%"></div>
          <div class="new-bar" style="width:${newPct}%"></div>
        </div>
      </div>
      <div class="diff-old">- ${f.oldLines} lines (${fmtChars(f.oldChars)})</div>
      <div class="diff-new">+ ${f.newLines} lines (${fmtChars(f.newChars)})</div>
    </div>`;
  }).join('');
}

function renderFiles() {
  const el = document.getElementById('files');
  const countEl = document.getElementById('fileCount');
  countEl.textContent = state.files.length ? `(${state.files.length})` : '';

  if (state.files.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:13px">No files loaded yet</div>';
    return;
  }

  el.innerHTML = state.files.map(f => {
    const shortPath = f.path.split(/[/\\]/).slice(-3).join('/');
    return `<div class="file-row">
      <span class="file-icon">&#128196;</span>
      <span class="file-path" title="${f.path}">${shortPath}</span>
      <span class="file-size">${fmtChars(f.chars)} chars</span>
    </div>`;
  }).join('');
}

function renderLLMCalls() {
  const el = document.getElementById('llmCalls');
  if (state.llmCalls.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:13px">No LLM calls yet...</div>';
    return;
  }

  el.innerHTML = state.llmCalls.map(c => {
    let timeStr = '';
    if (c.startTime) timeStr = fmtDuration(c.startTime, c.endTime);
    const shortModel = (c.model || '').split('/').pop();

    return `<div class="llm-row">
      <span class="label">${c.agent || '?'}</span>
      <span class="model" title="${c.model}">${shortModel}</span>
      <span class="size">prompt: ${fmtChars(c.promptChars)}</span>
      <span class="size">resp: ${fmtChars(c.responseChars)}</span>
      <span class="time">${timeStr}</span>
      <span class="status-badge ${c.status}">${c.status === 'pending' ? '...' : c.status === 'done' ? 'OK' : 'ERR'}</span>
    </div>`;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

function renderLog() {
  const el = document.getElementById('logEntries');
  const countEl = document.getElementById('eventCount');
  countEl.textContent = `(${state.events.length})`;

  // Show last 100 events
  const recent = state.events.slice(-100);
  el.innerHTML = recent.map(ev => {
    const t = new Date(ev.ts * 1000);
    const timeStr = t.toLocaleTimeString();
    const kindClass = ev.kind.split('.')[0];
    const msg = Object.entries(ev.data || {}).map(([k,v]) => {
      if (typeof v === 'string' && v.length > 80) v = v.slice(0, 80) + '...';
      return `${k}=${v}`;
    }).join('  ');

    return `<div class="log-entry">
      <span class="log-time">${timeStr}</span>
      <span class="log-kind ${kindClass}">${ev.kind}</span>
      <span class="log-msg">${msg}</span>
    </div>`;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

// ── Timer ──────────────────────────────────────────────────────────────────

setInterval(() => {
  if (state.startTime) {
    const s = (Date.now() - state.startTime) / 1000;
    document.getElementById('elapsed').textContent =
      s < 60 ? Math.floor(s) + 's' : Math.floor(s/60) + 'm ' + Math.floor(s%60) + 's';
  }
  // Re-render running timers
  renderPhases();
  renderAgents();
  renderAgentContext();
}, 1000);

// ── Init ───────────────────────────────────────────────────────────────────

fetch('/api/config')
  .then(r => r.json())
  .then(config => {
    const grid = document.getElementById('configGrid');
    const entries = [
      ['Mode', config.llm_mode],
      ['Heavy Model', config.heavy_model],
      ['Light Model', config.light_model],
      ['Context Size', config.context_size?.toLocaleString() + ' tokens'],
      ['Base URL', config.base_url],
      ['Min Severity', config.severity_threshold],
    ];
    grid.innerHTML = entries.map(([k,v]) =>
      `<span class="config-label">${k}</span><span class="config-value">${v || '—'}</span>`
    ).join('');
  });

// Load history first, then connect for live events
fetch('/api/history')
  .then(r => r.json())
  .then(events => {
    events.forEach(e => handleEvent(e));
    connect();
  })
  .catch(() => connect());

</script>
</body>
</html>
